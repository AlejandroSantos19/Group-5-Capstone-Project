<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar - Tasktopus</title>
    <style></style>

    <!-- Test comment -->

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-topbar">
      <div class="topbar-left">
        <a href="dashboard.html" class="brand-wrap">
          <img
            src="tasktopus_logo.png"
            alt="Tasktopus logo"
            class="brand-logo small-logo"
          />
        </a>
      </div>
      <div class="topbar-center">
        <h1 class="topbar-title">Tasktopus</h1>
      </div>
      <div class="topbar-right"></div>
    </header>

    <nav class="app-nav">
      <div class="app-nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="VisualGraphs.html">Visual Graphs</a>
        <a href="Calendar.html">Calendar</a>
        <a href="Messages.html">Messages</a>
        <a href="Account.html">Account</a>
      </div>
    </nav>

    <main class="app-main">
      <div class="calendar-container">
        <h1>Calendar</h1>

        <div class="calendar-header">
          <button onclick="prevMonth()">❮</button>
          <h3 id="monthYear"></h3>
          <button onclick="nextMonth()">❯</button>
        </div>

        <div class="calendar-days">
          <div>Sun</div>
          <div>Mon</div>
          <div>Tue</div>
          <div>Wed</div>
          <div>Thu</div>
          <div>Fri</div>
          <div>Sat</div>
        </div>

        <div id="calendarDates" class="calendar-dates"></div>
      </div>
    </main>

    <script src="Calendar.js"></script>
  </body>
</html>
